<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set de cocina italiana - Detalle</title>
    <link rel="stylesheet" href="css/producto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="producto-wrapper">
        
        <header class="producto-header">
            <a href="categoria-cocina.html" class="back-btn">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <h1>Set de cocina italiana...</h1>
            <div class="header-placeholder"></div>
        </header>

        <main class="producto-content">
            
            <div class="hero-imagen-container">
                <img src="img/cocinaItaliana.jpeg" alt="Set de cocina italiana" class="hero-image">
                <i class="fa-solid fa-rotate-right icon-360"></i>
                
                <div class="acciones-flotantes">
                    <button class="btn-flotante"><i class="fa-solid fa-plus"></i></button>
                    <button class="btn-flotante"><i class="fa-solid fa-headphones"></i></button>
                    <button class="btn-flotante"><i class="fa-solid fa-window-maximize"></i></button>
                    <button class="btn-flotante"><i class="fa-solid fa-circle-dot"></i></button>
                    <button class="btn-flotante"><i class="fa-solid fa-box-archive"></i></button>
                    <button class="btn-flotante"><i class="fa-solid fa-lightbulb"></i></button>
                </div>
            </div>

            <div class="detalles-container">
                <div class="detalles-header">
                    <span class="label-descripciones">Descripciones</span>
                    <span class="label-precio">precio -------</span>
                </div>

                <div class="tarjetas-metricas">
                    <div class="tarjeta-metrica rosa">
                        <div class="metrica-fila"><span class="metrica-lbl">Temp</span><span class="metrica-val">24°C</span></div>
                        <div class="metrica-fila"><span class="metrica-lbl">Hum</span><span class="metrica-val">54 %</span></div>
                    </div>
                    
                    <div class="tarjeta-metrica azul">
                        <div class="metrica-fila"><span class="metrica-lbl">Temp</span><span class="metrica-val">30°C</span></div>
                        <div class="metrica-fila"><span class="metrica-lbl">Hum</span><span class="metrica-val">80 %</span></div>
                    </div>
                </div>
            </div>

        </main>

        <footer class="producto-footer">
            <a href="carrito.html" class="btn-carrito">
                <i class="fa-solid fa-cart-shopping"></i>
                Añadir al carrito
            </a>
        </footer>

    </div>

</body>
</html>
