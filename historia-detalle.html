<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Historia</title>
    <link rel="stylesheet" href="css/historia.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="historia-wrapper">
        
        <header class="historia-header">
            <a href="menu.html" class="back-btn">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <div class="vendedor-info">
                <img src="img/MuebleHistoria1.jpg" alt="Manuel Hernandez" class="avatar">
                <span class="vendedor-name">Manuel Hernandez</span>
            </div>
        </header>

        <main class="historia-main">
            <div class="imagen-contenedor">
                <img src="img/MuebleHistoria1.jpg" alt="Sofá gris">
            </div>
            
            <div class="texto-contenedor">
                <p>Vendo sofá de 3 puestos, gris, en excelente estado y con poco uso. Perfecto para sala o estudio. Ubicado en Bogotá. Precio: COP 450,000. Interesados, envíen mensaje para coordinar la compra.</p>
            </div>
        </main>

        <footer class="historia-footer">
            <button class="btn-contactar">Contactar</button>
        </footer>

    </div>

</body>
</html>
