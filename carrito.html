<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de compras</title>
    <link rel="stylesheet" href="css/carrito.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="carrito-wrapper">
        
        <header class="carrito-header">
            <a href="producto-detalle.html" class="back-btn">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <h1>Carrito de compras</h1>
            <div class="header-placeholder"></div>
        </header>

        <main class="carrito-content">
            
            <div class="aviso-banner">
                <p>Haz añadido al carro este elemento</p>
            </div>

            <div class="producto-item">
                <div class="producto-info">
                    <h2>Set de cocina moderna italiana</h2>
                </div>
                <div class="producto-imagen">
                    <img src="img/cocinaItaliana.jpeg" alt="Set de cocina moderna italiana">
                </div>
            </div>

            <div class="accion-compra-container">
                <button class="btn-seguir-compra">Seguir con esta compra</button>
            </div>

        </main>

        <footer class="carrito-footer">
            <a href="menu.html" class="btn-seguir-comprando">
                <i class="fa-solid fa-house"></i>
                <span>Seguir comprando</span>
            </a>
        </footer>

    </div>

</body>
</html>
